<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
        padding : 0;
        margin :  0;
        box-sizing : border-box;
    }
     
    html,body{
        height : 100%;
        width  : 100%;
    }
     .main{
      
      height: 100%;
      width: 100%;
      background-color: black;
      display: grid;
      grid-template-columns: 25% 25% 50%;
      grid-template-rows: 8% 68% 28%;
      grid-template-areas: 
      "top top top"
      "left-top left-top right"
      "left-bottom-left left-bottom-right right"
      ;
      gap: 10px;
     }

     .top{
      background-color: coral;
      grid-area: top;
     }
     .left-top{
      background-color: orange;
      grid-area: left-top;
     }
     .left-bottom-left{
      background-color: rgb(140, 250, 115);
      grid-area: left-bottom-left;
    }
    .left-bottom-right{
      background-color: cadetblue;
      grid-area: left-bottom-right;
     }

     .right{
      background-color: skyblue;
      grid-area: right;
     }
  </style>
</head>
<body>
  <div class="main">
    <div class="top"></div>
    <div class="left-top"></div>
    <div class="left-bottom-left"></div>
    <div class="left-bottom-right"></div>
    <div class="right"></div>
  </div>
</body>
</html>
