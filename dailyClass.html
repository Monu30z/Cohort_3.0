<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
      }
      .main {
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        background-color: rgb(64, 64, 64);
      }
      .nav {
        width: 100%;
        height: 100px;
        background-color: crimson;
      }
      .center {
        width: 100%;
        height: 100px;
        /* height: calc(100% - 100px); */
        background-color: rgb(20, 173, 220);
      }
      .footer {
        width: 100%;
        height: 100px;
        background-color: rgb(207, 192, 28);
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="nav"></div>
      <div class="center"></div>
      <div class="footer"></div>
    </div>
  </body>
</html>
