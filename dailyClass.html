<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        font-size: 50px;
      }
      .main {
        height: 100%;
        width: 100%;
        background-color: #333;
        display: grid;
        grid-template-columns: repeat(3,1fr);
        grid-template-rows: repeat(3,2fr);
        align-items: center;
        justify-items: center;
      }
      .box{
        background-color: rgb(113, 255, 253);
        height: 200px;
        width: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid black;

        /* To center items */
        /* align-self: center;
        justify-self: center; */
      }
  
    </style>
  </head>
  <body>
    <div class="main">
     <div class="box">1</div>
     <div class="box">2</div>
     <div class="box">3</div>
     <div class="box">4</div>
     <div class="box">5</div>
     <div class="box">6</div>
     <div class="box">7</div>
     <div class="box">8</div>
     <div class="box">9</div>
     <!-- <div class="box">10</div> -->
  
    </div>
  </body>
</html>
