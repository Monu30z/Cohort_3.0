<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
      }
      main{
        height: 100%;
        width: 100%;
        background-color: rgb(0, 0, 0);
        display: grid;
        grid-template-columns: 50% 50%;
        grid-template-rows: 10% 40% 40% 10%;
        gap: 10px;
      }
      header{
        background-color: aquamarine;
        grid-column-start: 1;
        grid-column-end: 3;
    
      }
      .lefttop{
        background-color: rgb(49, 80, 128);
        grid-column-start: 1;
        grid-column-end: 2;
        grid-row-start: 2;
        grid-row-end: 3;
        
      }
      .leftbottom{
        background-color: rgb(80, 131, 207);
        grid-column-start: 1;
        grid-column-end: 2;
        grid-row-start: 3;
        grid-row-end: 4;
      }
      .right{
        background-color: indianred;
        grid-column-start: 2;
        grid-column-end: 3;
        grid-row-start: 2;
        grid-row-end: 4;
 
      }
      footer{
        background-color: cadetblue;
        grid-column-start: 1;
        grid-column-end: 3;
  
      }

  
    </style>
  </head>
  <body>
<main>
  <header>Header</header>
  <div class="lefttop">lefttop</div>
  <div class="leftbottom">leftbottom</div>
  <div class="right">Right</div>
<footer>footer</footer>
</main>
  </body>
</html>
